<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheWorkingZone</title>
    <style>
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .loader { text-align: center; color: #0A2540; }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      p { margin: 0; font-size: 14px; color: #64748b; }
    </style>
    <script>
      // Only redirect if we haven't already (prevent infinite loop)
      var l = window.location;
      if (l.search.indexOf('~and~') === -1 && l.search[1] !== '/') {
        var path = l.pathname.replace(/\/$/, '');
        l.replace(l.origin + '/?/' + path.slice(1).replace(/&/g, '~and~') + l.hash);
      }
    </script>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <p>Redirecting...</p>
    </div>
  </body>
</html>
